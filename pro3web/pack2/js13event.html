<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function func1(){
            // alert("a");
            document.getElementById("show").innerHTML = "전통적인 이벤트 처리";
        }

        let a = 10;
        let b = {
            funcNew1:function(){
                document.getElementById("show").innerHTML = "b 객체의 메소드 처리";
            },
            funcNew2:function(){
                document.getElementById("show").innerHTML = "<h1>b 객체의 멤버 수행</h1>";
            }
        }
    </script>

    <script>
        // server의 web을 client가 완전히 읽어오면(= 문서 수신이 완료되면), "load" 이벤트 발생
        //  -> 1회용(초기화 담당) -> callback 함수(시스템이 읽어옴)
        // window.onload = alert("ok")
        window.onload = function(){
            // alert("ok");

            // id로 호출
            const exBtn1 = document.getElementById("btn1");     // 버튼을 읽어 변수에 기억
            exBtn1.onclick = function(){                        // 이벤트를 장착
                document.getElementById("show").innerHTML = "클릭 1 선택";
            }

            // 이름으로 호출
            const exBtn2 = document.getElementsByName("myBtn"); // myBtn 이름이 두 개 이상이므로, 배열에 기억
            console.log(exBtn2.length);
            exBtn2[0].onclick = function(){
                document.getElementById("show").innerHTML = "<i>클릭2 누름</i>"
            }
            exBtn2[1].onclick = function(){
                document.getElementById("show").innerHTML = "<i>클릭3 누름</i>"
            }

            // tag로 호출
            const exBtn4 = document.getElementsByTagName("button")[3];
            exBtn4.onclick = function(){
                document.getElementById("show").innerHTML = "<b>클릭4 선택함</b>"
            }

            // 이벤트 연결 및 해제
            // addEvenvtListener("이벤트 종류", 핸들러 함수)    -> on X 오직 이벤트 종류, 함수 뒤에 () 사용 X
            document.getElementById("btn5").addEventListener("click", abcFunc);         // 이벤트 연결
        }

        function abcFunc(){
            // alert("abc");
            document.getElementById("show").innerHTML = "클릭5 이벤트 연결 처리";

            document.getElementById("btn5").removeEventListener("click", abcFunc);      // 이벤트 연결 해제
        }
    </script>
</head>
<body>
    <h2>이벤트 처리 : 이벤트 핸들러 연결</h2>
    <input type="button" value="버튼1" onclick="func1()"><br>
    <input type="button" value="버튼2" onclick="b.funcNew1()"><br>
    <input type="button" value="버튼3" onclick="b.funcNew2()"><br>
    <hr>
    <!--<button id="btn1" onclick="이벤트 처리함수">클릭1</button>-->
    <button id="btn1">클릭1</button>
    <button id="btn2" name="myBtn">클릭2</button>
    <button id="btn3" name="myBtn">클릭3</button>
    <button id="btn4">클릭4</button>
    <button id="btn5">클릭5</button>

    <div id="show">

    </div>

</body>
</html>
