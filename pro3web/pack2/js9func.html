<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    ES6부터는 화살표 함수(arrow function)라는 새로운 문법 방식으로 함수를 만들 수 있게 됐다.<br>
    화살표 함수는 => 기로흘 사용하여 funtion 키워드를 생략한다.<br>
    함수 표현식보다 단순한 문법으로 함수 처리가 가능해진다.<br>
    형식 : let 객체변수 = (parameter, ...) => {표현식}<br>
    <hr>
    <script>
        'use strict';       /*ECMA6 이후 문법을 사용하겠다는 의미*/
        document.write('<h2>-- 일반적인 function 사용 : function 함수명(parameter ...){...}</h2>')
        function sum0(a, b){
            return a + b;
        }
        document.write(sum0(2, 3));
        document.write('<br>');

        let sum1 = function(a, b){
            return a + b;
        }
        document.write(sum1(2, 3));
        document.write('<br>');

        document.write('<h2>-- arrow function 사용 : let 객체변수 = (parameter, ...){} => {표현식}</h2>')
        document.write('<h3>** {} 중괄호 안에 들으갈 식, 즉 return값이 한 개라면, 중괄호 생략</h3>')
        let sum2 = (a, b) => a + b;
        document.write(sum2(2,3));
        document.write('<br>');

        let sum3 = (a, b) => {return a + b};
        document.write(sum2(2,3));
        document.write('<br>');

        // let double1 = (n) => {n * 2};
        let double1 = n => n * 2;
        document.write(`double1(n) = n * 2 의 결과 : ${double1(2)}`);
        document.write('<br>');

        let sayHi = () => {
            document.write('안녕하세요');
        }
        sayHi();

        document.write('<h3>-------삼항 연산자 -------</h3>')
        let age = 25;
        let welcome = (age < 30)?() => document.write("? 앞, 조건이 True여서 : 앞의 값 출력"):document.write("? 앞, 조건이 False여서 : 뒤의 값 출력")
        welcome();
        document.write('<br>');
        document.write('<h3>---------------------------</h3>')

        let sumFunc = (a, b) => {
            let result = a + b;
            return result;
        }
        document.write(`두 수의 합은 ${sumFunc(5, 6)}`);

    </script>
</body>
</html>
