<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- 사용자 정의 함수를 head(선언부)에 선언 후, body의 script에서 불러서 씀-->
    <script type="text/javascript">
        function bb(){
            document.write('bb 함수 실행 성공');
            cc(5);                              // 함수가 다른 함수를 호출 가능 (반환값 무시)
            // return;                          // return : 함수 무조건 탈출 (함수 내의 아래 문장은 수행 안함.) -> 자기를 부른 곳으로 돌아감.
            let re = cc(5);                     // (반환값 처리)
            document.write(`<br>re는 ${re}`);

            // dd(para1, para2)함수 호출
            dd(7, 8);
            dd(7, 8, 9);            // javascript에서는, 세번째 인자는 무시되고 에러 X, 정상 실행.
            dd(7);                  // 두번째 인자는 undefined로 출력되고 에러 X, 정상 실행.
        }

        // 매개변수가 있는 함수
        function cc(para){
            let kk = para + 10;
            document.write(`<br>kk는 ${kk}`);
            return kk;                          // 반환값은 1개만 가능
        }

        function dd(para1, para2){
            document.write(`<br>para1은 ${para1}, para2는 ${para2}`);
        }

        // javascript는 일급객체 지원 - Python과 동일
        // 함수를 다른 값(숫자, 문자열, 객체)처럼 동일하게 다룰 수 있다는 의미.

        // 전역(Global), 지역(Local) 변수
        let a = 100;            // 전역(Global) 변수
        const b = 200;          // 전역(Global) 상수

        function Func(){
            let c = 300;        // 지역(Local) 변수
            const d = 400;      // 지역(Local) 상수
            document.write(`<br>a:${a} b:${b}`);
            document.write(`<br>c:${c} d:${d}`);
        }

    </script>

</head>
<body>
    <h1>함수(function) : 어떤 특별한 목적의 작업을 수행하도록 설계된 독립적 블록 {} 을 의미.</h1>
    <br>
    <script>
        // 내장함수 : js가 기본 지원
        document.write("<h2>내장함수 : js가 기본 지원</h2>");
        let str = "Java Script Language";

        // .chartAt(n) : n 번째 값 출력
        document.write(`str.charAt(2) : ${str.charAt(2)}`)

        // .bold() : 서식 굵게 출력
        document.write(`<br>str.bold() : ${str.bold()}`)

        // Math.abs(n) : n의 절대값 출력
        document.write(`<br>Math.abs(-7) : ${Math.abs(-7)}`)

        // ...
    </script>
    <hr>
    <h2>사용자 정의 함수 : 보일러플레이트 코드(최소한의 수정을 통한 확장성이 보장된 코드 작업)</h2>
    <script>
        let count = 0;          // 전역(Global) 변수 선언

        // 일반 함수 선언
        function aa(){
            // let count = 0;               // 지역(Local) 변수 선언
            count += 1;
            document.write(count + "번째 수행<br>");
        }

        aa();                   // 함수 실행        
        document.write("뭔가를 하다가...<br>");
        aa();                   // 함수 실행
        document.write("함수는 참조형 타입 : ", typeof(aa));        // 사용자 정의 함수는 function 객체.
    </script>

    <div>html로 빠져 나옴.</div>

    <script>
        document.write("다시 script로 들어와서...<br>");
        aa();
        document.write("<br>");
    </script>
    <div>
        <b>
            ------ 생각의 전환 : html 선언부에 js 코드(사용자 정의 함수) 작성 후, 함수 호출하기 ------
        </b>
    </div>
    <script>
        bb();

        document.write("<br>--- 전역, 지역 변수 ---")
        Func();
        document.write(`<br> ** body 에서 전역(Global)변수 출력 가능 -->>>  a:${a} b:${b}`);
        document.write(`<br>** body 에서 지역(Local)변수는 출력 불가능`);
    </script>
</body>
</html>
